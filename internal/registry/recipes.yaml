# DWS Recipe Registry
#
# Registry fields:
# - name: unique id (directory: recipe-{name})
# - title: recipe title
# - description: compact intent text
# - category: workflow domain
# - services: canonical DWS product ids
# - steps: concrete executable steps
# - caution: optional warning for risky operations

recipes:
  - name: meeting-prep-and-share
    title: 会议准备并共享材料
    description: "创建会议议程文档，安排日程，并把材料链接同步到群聊。"
    category: collaboration
    services: [doc, calendar, chat, drive]
    steps:
      - "创建议程文档：`dws mcp doc create_document --json '{\"title\":\"项目评审会-议程\"}' --format json`"
      - "创建日程：`dws mcp calendar create_event --json '{\"title\":\"项目评审会\"}' --format json`"
      - "将文档链接发送到群聊：`dws mcp chat send_message --json '{\"text\":\"会议材料已准备，请查看文档链接\"}' --format json`"
    caution: "发送通知前确认群会话与参会人范围，避免误发。"

  - name: minutes-to-todo
    title: 听记转待办
    description: "提取听记摘要与待办，批量创建任务并跟踪执行。"
    category: productivity
    services: [minutes, todo, contact]
    steps:
      - "查询听记摘要：`dws mcp minutes get_summary --json '{\"minutes_id\":\"<MINUTES_ID>\"}' --format json`"
      - "提取待办：`dws mcp minutes get_todos --json '{\"minutes_id\":\"<MINUTES_ID>\"}' --format json`"
      - "创建待办：`dws mcp todo create_task --json '{\"title\":\"<TODO_TITLE>\"}' --format json`"
    caution: "批量创建任务前确认去重策略，防止重复下发。"

  - name: oa-triage-and-notify
    title: 审批处理与通知
    description: "拉取待审批单据，完成处理后同步结果通知相关群。"
    category: approval
    services: [oa, chat, report]
    steps:
      - "查询待处理审批：`dws mcp oa list_pending --json '{}' --format json`"
      - "执行审批处理：`dws mcp oa approve --json '{\"instance_id\":\"<INSTANCE_ID>\"}' --format json`"
      - "发送处理结果：`dws mcp chat send_message --json '{\"text\":\"审批处理完成\"}' --format json`"
    caution: "同意/拒绝前必须与用户确认审批单据与处理意见。"

  - name: drive-upload-and-announce
    title: 上传钉盘并公告
    description: "上传文件到钉盘并在群聊公告下载链接。"
    category: file-management
    services: [drive, chat]
    steps:
      - "查询上传参数：`dws mcp drive upload_info --json '{\"name\":\"report.pdf\"}' --format json`"
      - "提交上传：`dws mcp drive commit --json '{\"name\":\"report.pdf\"}' --format json`"
      - "群聊发送公告：`dws mcp chat send_message --json '{\"text\":\"文件已上传到钉盘\"}' --format json`"
    caution: "上传前确认文件内容不含敏感信息。"

  - name: attendance-summary-mail
    title: 考勤汇总邮件
    description: "获取考勤摘要并通过邮箱发送给指定负责人。"
    category: operations
    services: [attendance, mail, contact]
    steps:
      - "查询考勤摘要：`dws mcp attendance summary --json '{\"user_id\":\"<USER_ID>\"}' --format json`"
      - "获取邮箱地址：`dws mcp contact get_user --json '{\"user_id\":\"<USER_ID>\"}' --format json`"
      - "发送邮件：`dws mcp mail send_message --json '{\"subject\":\"考勤摘要\"}' --format json`"
    caution: "邮件外发前确认收件人与数据脱敏要求。"
